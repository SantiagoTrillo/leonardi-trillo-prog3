<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../shared/css/styles.css">
    <link rel="stylesheet" href="./productos.css">
    <script src="../../shared/js/tema.js" defer></script>
    <script src="./productos.js" defer></script>
</head>
<body class="pagina-productos">
    <div class="marco-aplicacion d-flex flex-column">
        <nav class="barra-superior">
            <div class="contenido-barra-superior">
                <div class="seccion-izquierda d-flex align-items-center gap-3">
                    <a class="btn-home" href="../bienvenida/bienvenida.html" id="btnHome" aria-label="Ir al inicio">
                        <i class="fa-solid fa-house"></i>
                    </a>
                    <button class="btn-tema" id="btnTema" aria-label="Cambiar tema" type="button">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <span class="nombre-aplicacion">CineStream</span>
                <div class="seccion-derecha">
                    <p class="autores">Hecho por: Santiago Leonardi y Santiago Trillo</p>
                </div>
            </div>
        </nav>
        <div class="cuerpo-productos d-flex flex-grow-1">
            <aside class="panel-izquierdo d-flex flex-column align-items-center">
                <button class="btn-catalogo active" id="btnSeries" type="button">Catálogo de series</button>
                <button class="btn-catalogo" id="btnPeliculas" type="button">Catálogo de películas</button>
            </aside>
            <main class="panel-central d-flex flex-column flex-grow-1">
                <div class="cabecera-panel-central text-center">
                    <h1 class="saludo-bienvenida">Te damos la bienvenida, <span id="nombreClienteSpan"></span></h1>
                    <h2 class="subtitulo-seccion"><span id="tipoCatalogoSpan">Series</span> disponibles</h2>
                </div>
                <div class="grilla-productos" id="grillaProductos"></div>
            </main>
            <aside class="panel-derecho d-flex flex-column overflow-hidden">
                <div class="cabecera-carrito text-center"><h3>Mi Carrito</h3></div>
                <div class="lista-carrito flex-grow-1 overflow-auto" id="listaCarrito">
                    <div class="carrito-vacio-msg text-center py-5">
                        <i class="fa-solid fa-basket-shopping mb-2"></i>
                        <p class="mb-0">El carrito está vacío</p>
                    </div>
                </div>
                <div class="pie-carrito">
                    <div class="d-flex justify-content-between mb-3 px-2">
                        <span class="total-label">Total:</span>
                        <span class="total-monto" id="totalMonto">$0</span>
                    </div>
                    <a href="../carrito/carrito.html" class="btn-continuar" id="btnContinuar">Continuar</a>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
