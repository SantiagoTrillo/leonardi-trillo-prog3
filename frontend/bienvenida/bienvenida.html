<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="./bienvenida.css">
    <script src="./bienvenida.js" defer></script>
</head>
<body class="pagina-bienvenida">
    <div class="marco-aplicacion">
        <nav class="barra-bienvenida">
            <div class="contenido-barra-bienvenida">
                <a class="btn btn-outline-light acceso-administradores" href="/admin/login">Acceso Administradores</a>
                <span class="nombre-aplicacion">*Nombre Aplicación*</span>
                <p class="autores">Hecho por: Santiago Leonardi y Santiago Trillo</p>
            </div>
        </nav>
        <main class="contenido-bienvenida d-flex flex-column align-items-center text-center">
            <h1 class="titulo-bienvenida">Te damos la bienvenida</h1>
            <form id="formularioBienvenida" class="formulario-bienvenida d-flex flex-column align-items-center">
                <label class="visually-hidden" for="nombreCliente">Ingrese su nombre</label>
                <input class="form-control campo-nombre" type="text" id="nombreCliente" name="nombreCliente" placeholder="Ingrese su nombre" autocomplete="given-name" required>
                <button class="btn btn-dark boton-continuar" type="submit">Continuar --&gt;</button>
            </form>
        </main>
    </div>
</body>
</html>
