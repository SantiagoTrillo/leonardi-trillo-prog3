<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../shared/css/styles.css">
    <link rel="stylesheet" href="./bienvenida.css">
    <script src="../../shared/js/tema.js" defer></script>
    <script src="./bienvenida.js" defer></script>
</head>
<body class="pagina-bienvenida">
    <div class="marco-aplicacion">
        <nav class="barra-bienvenida">
            <div class="contenido-barra-bienvenida">
                <div class="seccion-izquierda d-flex align-items-center gap-3">
                    <a class="btn btn-outline-light acceso-administradores" href="http://localhost:3000/admin/login">Acceso Administradores</a>
                    <button class="btn-tema" id="btnTema" aria-label="Cambiar tema" type="button">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <span class="nombre-aplicacion">CineStream</span>
                <p class="autores">Hecho por: Santiago Leonardi y Santiago Trillo</p>
            </div>
        </nav>
        <main class="contenido-bienvenida d-flex flex-column align-items-center text-center">
            <h1 class="titulo-bienvenida">Te damos la bienvenida</h1>
            <form id="formularioBienvenida" class="formulario-bienvenida d-flex flex-column align-items-center">
                <label class="visually-hidden" for="nombreCliente">Ingrese su nombre</label>
                <input class="form-control campo-nombre" type="text" id="nombreCliente" name="nombreCliente" placeholder="Ingrese su nombre" autocomplete="given-name" maxlength="50" required>
                <button class="btn btn-dark boton-continuar" type="submit">Continuar</button>
            </form>
        </main>
    </div>
</body>
</html>
