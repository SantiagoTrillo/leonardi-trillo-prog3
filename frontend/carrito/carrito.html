<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - CineStream</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="./carrito.css">
    <script src="../js/tema.js" defer></script>
    <script src="./carrito.js" defer></script>
</head>
<body class="pagina-carrito">
    <div class="marco-aplicacion d-flex flex-column">
        <nav class="barra-superior">
            <div class="contenido-barra-superior">
                <div class="seccion-izquierda d-flex align-items-center gap-3">
                    <a class="btn-home" href="../bienvenida/bienvenida.html" id="btnVolver" aria-label="Volver al inicio">
                        <i class="fa-solid fa-house"></i>
                    </a>
                    <button class="btn-tema" id="btnTema" aria-label="Cambiar tema" type="button">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <span class="nombre-aplicacion">CineStream</span>
                <div class="seccion-derecha">
                    <p class="autores">Hecho por: Santiago Leonardi y Santiago Trillo</p>
                </div>
            </div>
        </nav>
        
        <div class="cuerpo-carrito d-flex flex-grow-1">
            <main class="panel-izquierdo d-flex flex-column flex-grow-1 p-4">
                <div class="cabecera-panel-izquierdo text-center mb-3">
                    <h1 class="titulo-seccion">Productos seleccionados</h1>
                </div>
                
                <div class="grilla-posters mb-4" id="grillaPosters"></div>
                
                <div class="seccion-confirmar text-center">
                    <button class="btn-confirmar-compra w-100" id="btnConfirmarCompra" type="button">
                        Confirmar compra
                    </button>
                </div>
            </main>
            
            <aside class="panel-derecho d-flex flex-column p-4">
                <div class="cabecera-resumen text-center mb-3">
                    <h2 class="titulo-resumen">Detalle del Carrito</h2>
                </div>
                
                <div class="lista-resumen-carrito flex-grow-1 overflow-auto" id="listaResumenCarrito"></div>
                
                <div class="pie-resumen mt-3">
                    <div class="d-flex justify-content-between align-items-center mb-2 px-2">
                        <span class="total-label">TOTAL:</span>
                        <span class="total-monto" id="totalMonto">$0</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    
    <div class="superposicion-modal d-none" id="modalConfirmarCompra">
        <div class="tarjeta-modal">
            <p class="texto-modal">¿Seguro que desea confirmar la compra?</p>
            <div class="d-flex justify-content-center gap-3">
                <button class="btn btn-dark boton-modal-confirmar" id="botonConfirmarCompra" type="button">Confirmar</button>
                <button class="btn btn-outline-light boton-modal-cancelar" id="botonCancelarCompra" type="button">Cancelar</button>
            </div>
        </div>
    </div>
</body>
</html>
