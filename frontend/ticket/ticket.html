<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="./ticket.css">
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
    <script src="../js/tema.js" defer></script>
    <script src="./ticket.js" defer></script>
</head>
<body class="pagina-ticket">
    <div class="marco-aplicacion d-flex flex-column">
        <nav>
            <div>
                <div class="d-flex align-items-center gap-3">
                    <a class="btn-home" href="../bienvenida/bienvenida.html" id="btnHome" aria-label="Ir al inicio"><i class="fa-solid fa-house"></i></a>
                    <button class="btn-tema" id="btnTema" aria-label="Cambiar tema" type="button"><i class="fa-solid fa-moon"></i></button>
                </div>
                <span>CineStream</span>
                <div><p>Hecho por: Santiago Leonardi y Santiago Trillo</p></div>
            </div>
        </nav>
        <main class="cuerpo-ticket d-flex align-items-start justify-content-center flex-grow-1 p-4 overflow-auto">
            <div class="ticket-view-wrapper d-flex align-items-start justify-content-center">
                <div class="ticket-centro">
                    <div class="ticket-tarjeta">
                        <div class="ticket-header text-center"><h2 class="ticket-titulo-app">CineStream</h2></div>
                        <div class="ticket-separador-linea"></div>
                        <div class="ticket-meta">
                            <div class="meta-row d-flex justify-content-between mb-2">
                                <span class="meta-label">Cliente:</span>
                                <span class="meta-value" id="ticketNombreCliente">-</span>
                            </div>
                            <div class="meta-row d-flex justify-content-between mb-2">
                                <span class="meta-label">Fecha:</span>
                                <span class="meta-value" id="ticketFecha">X/X/XXXX</span>
                            </div>
                            <div class="meta-row d-flex justify-content-between">
                                <span class="meta-label">Hora:</span>
                                <span class="meta-value" id="ticketHora">HH:MM</span>
                            </div>
                        </div>
                        <div class="ticket-separador-linea"></div>
                        <div class="ticket-items" id="ticketItemsContainer">
                        </div>
                        <div class="ticket-separador-linea"></div>
                        <div class="ticket-total text-center"><h3 class="ticket-total-monto">Total: <span id="ticketTotalMonto">$0</span></h3></div>
                    </div>
                </div>
                <div class="ticket-acciones-lateral"><button class="btn-guardar-ticket" id="btnGuardarTicket" aria-label="Descargar Ticket PDF" type="button"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
