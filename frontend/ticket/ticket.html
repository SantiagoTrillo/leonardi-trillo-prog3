<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket - CineStream</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="./ticket.css">
    <script src="./ticket.js" defer></script>
</head>
<body class="pagina-ticket">
    <div class="marco-aplicacion d-flex flex-column">
        <nav class="barra-superior">
            <div class="contenido-barra-superior">
                <div class="seccion-izquierda d-flex align-items-center gap-3">
                    <button class="btn-tema" id="btnTema" aria-label="Cambiar tema" type="button">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <span class="nombre-aplicacion">CineStream</span>
                <div class="seccion-derecha">
                    <p class="autores">Hecho por: Santiago Leonardi y Santiago Trillo</p>
                </div>
            </div>
        </nav>
        
        <main class="cuerpo-ticket d-flex flex-column align-items-center justify-content-center flex-grow-1 p-4 overflow-auto">
            <div class="ticket-contenedor">
                <div class="ticket-cuerpo">
                    <div class="ticket-cabecera text-center mb-4">
                        <div class="ticket-logo mb-2">
                            <i class="fa-solid fa-film fs-2"></i>
                        </div>
                        <h1 class="ticket-titulo-app">CineStream</h1>
                        <p class="ticket-subtitulo">Comprobante de Entrada Digital</p>
                    </div>
                    
                    <div class="ticket-detalles-usuario mb-4">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="ticket-label">Cliente:</span>
                            <span class="ticket-valor" id="ticketNombreCliente">-</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="ticket-label">Fecha:</span>
                            <span class="ticket-valor" id="ticketFecha">-</span>
                        </div>
                    </div>
                    
                    <div class="ticket-division-linea mb-4">
                        <span class="ticket-corte-izq"></span>
                        <span class="ticket-corte-der"></span>
                    </div>
                    
                    <div class="ticket-items mb-4" id="ticketItemsContainer">
                    </div>
                    
                    <div class="ticket-division-linea mb-4">
                        <span class="ticket-corte-izq"></span>
                        <span class="ticket-corte-der"></span>
                    </div>
                    
                    <div class="ticket-total d-flex justify-content-between align-items-center">
                        <span class="ticket-total-label">TOTAL:</span>
                        <span class="ticket-total-monto" id="ticketTotalMonto">$0</span>
                    </div>

                    <div class="ticket-pie text-center mt-4 text-muted">
                        <p class="mb-0">¡Gracias por elegir CineStream!</p>
                        <p class="small">Disfrutá de tus películas y series favoritas.</p>
                    </div>
                </div>
            </div>

            <div class="ticket-botones d-flex gap-3 mt-4">
                <button class="btn-ticket btn-descargar" id="btnDescargarTicket" type="button">
                    <i class="fa-solid fa-file-pdf me-2"></i>Descargar PDF
                </button>
                <button class="btn-ticket btn-salir" id="btnSalir" type="button">
                    <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Salir / Nueva Compra
                </button>
            </div>
        </main>
    </div>
</body>
</html>
